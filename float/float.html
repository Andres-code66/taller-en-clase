<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarjeta Producto — Float</title>
  <link rel="stylesheet" href="float.css" />
</head>
<body>

  <h2>Tarjeta de Producto — Float</h2>

  <div class="cards-row">

    <div class="card">
      <div class="card-image">
        <img src="zapatos.jpeg" alt="zapatos pa profesor">
      </div>
      <div class="card-body">
        <p class="card-title">Zapatos LV pa profesor</p>
        <p class="card-desc">En piel de cocodrilo que no es lo mismo, Cómodos con el estilo urbano que caracteriza la marca Louis Vuitton.</p>
        <p class="card-price">$10.000.000</p>
        <button class="card-btn">Comprar</button>
      </div>
    </div>

    <div class="card">
      <div class="card-image">
        <img src="gatomenosprecio.jpeg" alt="gorra pa gato que mas quiere saber">
      </div>
      <div class="card-body">
        <p class="card-title">Gorra pa gato</p>
        <p class="card-desc">gorra pa gato pa que no se asolee y se vea mas lampara no acepto menosprecio.</p>
        <p class="card-price">$50.000</p>
        <button class="card-btn">Comprar</button>
      </div>
    </div>

  </div>

</body>
</html>
